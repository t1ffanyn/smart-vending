<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Vending — Install QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card {
      border: 2.5px solid #e2e8f0;
      border-radius: 24px;
      padding: 40px 44px 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .pill {
      background: linear-gradient(90deg, #00c9a7, #00C8FF);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 900;
      color: #04080F;
      letter-spacing: -0.3px;
    }

    .wordmark {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #0d1b3e;
      letter-spacing: 1px;
    }

    .qr-wrap {
      display: inline-block;
      padding: 12px;
      border-radius: 16px;
      background: #fff;
      border: 2px solid #e2e8f0;
      margin-bottom: 24px;
    }

    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #0d1b3e;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    p {
      font-size: 13px;
      color: #6b7a90;
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 20px 0;
    }

    .footer-text {
      font-size: 11px;
      color: #aab0bc;
      letter-spacing: 0.3px;
      line-height: 1.8;
    }

    .cta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(90deg, #00c9a7, #0094d4);
      color: #fff;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 20px;
    }

    @media print {
      body { padding: 0; background: #fff; }
      .card { border: 2px solid #ccc; box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo-pill">
    <span class="pill">SMART</span>
    <span class="wordmark">VENDING</span>
  </div>

  <div class="cta-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#fff"/>
    </svg>
    Scan to Get Started
  </div>

  <div class="qr-wrap">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0d1b3e&bgcolor=ffffff&data=https%3A%2F%2Fai-smartvending.com%2Finstall-request.html"
      width="220"
      height="220"
      alt="QR Code — ai-smartvending.com/install-request.html"
    />
  </div>

  <h2>Want a Smart Vending Machine at Your Business?</h2>
  <p>Scan the code above, leave your contact info, and we'll reach out to discuss installation — fast, easy, and no commitment.</p>

  <hr class="divider" />

  <div class="footer-text">
    ai-smartvending.com<br />
    service@ai-smartvending.com &nbsp;·&nbsp; 870-215-1305
  </div>

</div>

</body>
</html>
