<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Vending — Install QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #dce1e7;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card {
      width: 640px;
      height: 640px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
    }

    /* Gradient top band */
    .top-band {
      background: linear-gradient(90deg, #00c9a7 0%, #0094d4 100%);
      padding: 18px 28px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      background: rgba(0, 0, 0, 0.18);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .wordmark {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.92);
      letter-spacing: 1.5px;
    }

    .llc-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.7);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* White body */
    .body {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: 20px 36px 18px;
      text-align: center;
    }

    .headline {
      font-family: 'Outfit', sans-serif;
      font-size: 42px;
      font-weight: 900;
      color: #0d1b3e;
      line-height: 1.15;
    }

    .subline {
      font-size: 14px;
      font-weight: 600;
      color: #0094d4;
      margin-top: 6px;
    }

    .qr-wrap {
      display: inline-block;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      background: #fff;
    }

    .cta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(90deg, #00c9a7, #0094d4);
      color: #fff;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .footer-strip {
      font-size: 13px;
      font-weight: 700;
      color: #0d1b3e;
      letter-spacing: 0.3px;
      line-height: 1.8;
      border-top: 1px solid #f0f2f5;
      padding-top: 12px;
      width: 100%;
    }

    @media print {
      body { padding: 0; background: #fff; }
      .card {
        width: 8in;
        height: 8in;
        box-shadow: none;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Gradient top band -->
  <div class="top-band">
    <div class="logo-row">
      <span class="pill">SMART</span>
      <span class="wordmark">VENDING</span>
    </div>
    <span class="llc-badge">LLC</span>
  </div>

  <!-- White body -->
  <div class="body">

    <div>
      <div class="headline">Want an AI Smart Cooler<br />at Your Business?</div>
      <div class="subline">Contact Us at Smart Vending</div>
    </div>

    <div class="qr-wrap">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=0d1b3e&bgcolor=ffffff&data=https%3A%2F%2Fai-smartvending.com%2Finstall-request.html"
        width="200"
        height="200"
        alt="QR Code — ai-smartvending.com/install-request.html"
      />
    </div>

    <div class="cta-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#fff"/>
      </svg>
      Scan to Get Started
    </div>

    <div class="footer-strip">
      ai-smartvending.com &nbsp;·&nbsp; service@ai-smartvending.com<br />870-215-1305
    </div>

  </div>

</div>

</body>
</html>
