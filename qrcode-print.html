<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Vending — QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .card {
      border: 2.5px solid #e2e8f0;
      border-radius: 24px;
      padding: 40px 44px 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .pill {
      background: linear-gradient(90deg, #00c9a7, #00C8FF);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 15px;
      font-weight: 900;
      color: #04080F;
      letter-spacing: -0.3px;
    }
    .wordmark {
      font-size: 15px;
      font-weight: 400;
      color: #0d1b3e;
      letter-spacing: 1px;
    }
    #qr-canvas {
      margin: 0 auto 24px;
      display: block;
    }
    h2 {
      font-size: 18px;
      font-weight: 800;
      color: #0d1b3e;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    p {
      font-size: 13px;
      color: #6b7a90;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 20px 0;
    }
    .footer-text {
      font-size: 11px;
      color: #aab0bc;
      letter-spacing: 0.3px;
    }
    @media print {
      body { padding: 0; background: #fff; }
      .card { border: 2px solid #ccc; box-shadow: none; }
      .no-print { display: none; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-pill">
    <span class="pill">SMART</span>
    <span class="wordmark">VENDING</span>
  </div>

  <canvas id="qr-canvas"></canvas>

  <h2>Want something new in this machine?</h2>
  <p>Scan to request your favorite drink or snack — we review every submission!</p>

  <hr class="divider" />

  <div class="footer-text">service@ai-smartvending.com &nbsp;·&nbsp; 870-215-1305</div>
</div>

<script>
  QRCode.toCanvas(
    document.getElementById('qr-canvas'),
    'https://t1ffanyn.github.io/smart-vending/request-form.html',
    {
      width: 220,
      margin: 2,
      color: { dark: '#0d1b3e', light: '#ffffff' }
    }
  );
</script>

</body>
</html>
